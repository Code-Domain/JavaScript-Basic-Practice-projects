<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="description"
        content="A modern glassmorphism digital clock built with HTML, CSS, and JavaScript. Displays real-time hours, minutes, seconds, day, date, month, and year with a responsive and elegant UI design.">
    <title>Glass Clock</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: sans-serif;
        }

        .card {
            padding: 70px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            color: white;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .time {
            font-size: 9rem;
            margin-top: 10px;
        }

        .date {
            font-size: 3rem;
            margin-top: 10px;
        }

        .made a {
            color: white;
            padding: 10px 30px;
            border: 3px solid white;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
            display: inline-block;
            margin-top: 20px;
        }

        .made {
            width: 300px;
            height: 100px;
            position: absolute;
            bottom: 30px;
            right: 20px;
            text-align: center;
        }

        .made a {
            text-decoration: none;
            font-size: 1.3rem;
            text-align: center;
        }

        @media screen and (max-width:700px) {
            .card {
                padding: 30px;
                font-size: 2.5rem;
            }

            .date {
                font-size: 1.5rem;
            }

            .made a {
                font-size: 2rem;
            }

        }
    </style>
</head>

<body>
    <div class="card">
        <div class="time">00:00:00</div>
        <div class="date">Monday, 1 January 2026</div>
    </div>
    <div class="made">
        <a href="">Made By Code Domain</a>
    </div>
    <script>
        function timer() {
            const date = new Date();
            let dateNumber = date.getDate();
            let month = date.getMonth();
            let year = date.getFullYear();
            let hourse = date.getHours();
            let minut = date.getMinutes();
            let second = date.getSeconds();

            let arr = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thrusday", "Friday", "Saturday"];
            let months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            hourse = hourse >= 10 ? hourse : "0" + hourse;
            minut = minut >= 10 ? minut : "0" + minut;
            second = second >= 10 ? second : "0" + second;

            document.querySelector(".time").textContent = `${hourse}:${minut}:${second}`;
            document.querySelector(".date").textContent = `${arr[dateNumber]}, ${dateNumber} ${months[month]} ${year}`;
        }

        setInterval(timer, 1000);


    </script>
</body>

</html>
